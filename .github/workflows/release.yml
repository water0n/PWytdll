name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

defaults:
  run:
    shell: powershell

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Construir paquete
        run: |
          .\build.ps1 -Version $env:GITHUB_REF_NAME

      - name: Publicar GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME `
            "ytdll-release.zip#YTDLL $env:GITHUB_REF_NAME" `
            "YTDLL.bat#Instalador de YTDLL" `
            "Install-YTDLL.ps1#Bootstrap de YTDLL" `
            --title "YTDLL $env:GITHUB_REF_NAME" `
            --generate-notes
