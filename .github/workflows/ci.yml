name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: powershell

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validar sintaxis PowerShell
        run: |
          $failed = $false
          Get-ChildItem -Path . -Filter *.ps1 -File | ForEach-Object {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$errors
            )

            if ($errors.Count -gt 0) {
              $failed = $true
              $errors | ForEach-Object {
                Write-Error "$($_.Extent.File):$($_.Extent.StartLineNumber) $($_.Message)"
              }
            }
          }

          if ($failed) {
            exit 1
          }

      - name: Construir paquete de prueba
        run: |
          .\build.ps1 -Version "v0.0.0-ci"

      - name: Validar contenido del ZIP
        run: |
          $required = @(
            "Main.ps1",
            "Dependencies.ps1",
            "Functions.ps1",
            "GUI.ps1",
            "run.bat",
            "version.json"
          )

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead(
            (Join-Path $PWD "ytdll-release.zip")
          )
          try {
            $entries = @($zip.Entries | ForEach-Object FullName)
            foreach ($file in $required) {
              if ($file -notin $entries) {
                throw "Falta $file en ytdll-release.zip"
              }
            }
          } finally {
            $zip.Dispose()
          }

      - name: Subir paquete de prueba
        uses: actions/upload-artifact@v4
        with:
          name: ytdll-package
          path: ytdll-release.zip
